{% extends 'base.html' %}

{% block content %}
<h2>Delete Bill </h2>
<p> Are you sure, you want to delete invoice <strong> {{ object.invoice_number }} </strong></p>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-danger">Delete</button>

    <a href="{% url 'bill_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
