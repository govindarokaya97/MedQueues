{% extends 'base.html' %}

{% block content %}
<h2> Billing List </h2>


<table class="table table-bordered mt-3">
    <thead>
        <tr>
            <th>Invoice</th>
            <th>Patient</th>
            <th>Total</th>
            <th>Status</th>
            <th>Actions</th>

        </tr>
    </thead>

    <tbody>
        {% for bill in bills %}

        <tr>
            <td> {{ bill.invoice_number }}</td>
            <td> {{ bill.patient }}</td>
            <td> {{ bill.total_amount }}</td>
            <td> {{ bill.payment_status }}</td>

            <td> <a href="{% url 'bill_detail' bill.id %}" class="btn btn-info btn-sm">View</a></td>
            <td> <a href="{% url 'bill_edit' bill.id %}" class="btn btn-warning btn-sm">Edit</a></td>
            <td> <a href="{% url 'bill_delete' bill.id %}" class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No bills available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
