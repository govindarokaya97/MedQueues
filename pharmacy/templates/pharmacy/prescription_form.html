{% extends 'base.html' %}

{% block title %}Create Prescription{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4>Create Prescription</h4>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Patient</label>
                        {{ form.patient }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Doctor</label>
                        {{ form.doctor }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Appointment</label>
                        {{ form.appointment }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Status</label>
                        {{ form.status }}
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Notes</label>
                        {{ form.notes }}
                    </div>

                </div>

                <div class="mt-3">

                    <button type="submit" class="btn btn-success">
                        Save Prescription
                    </button>

                    <a href="{% url 'prescription_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
