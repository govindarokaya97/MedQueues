{% extends "base.html" %}

{% block content %}

<h2>Laboratory Tests</h2>

<a href="{% url 'test_add' %}" class="btn btn-primary">
    Add Laboratory Test
</a>

<hr>

{% for test in tests %}

<div>
    <h4>{{ test }}</h4>

    <a href="{% url 'test_detail' test.id %}">
        View
    </a>

    <a href="{% url 'test_edit' test.id %}">
        Edit
    </a>
</div>

{% empty %}

<p>No laboratory tests found.</p>

{% endfor %}

{% endblock %}
