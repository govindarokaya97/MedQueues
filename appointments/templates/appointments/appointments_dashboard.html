{% extends 'base.html' %}

{% block content %}
{% include "includes/back_button.html" %}
<div class="container mt-4">
    <h2> Appointment Dashboard </h2>

    <div class="row g-3">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h3>{{ total_appointments }}</h3>
                    <p>Total Appointments</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <h3>{{ pending }}</h3>
                    <p>Pending</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h3>{{ confirmed }}</h3>
                    <p>Confirmed</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h3>{{ completed }}</h3>
                    <p>Completed</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white">
                <div class="card-body">
                    <h3>{{ cancelled }}</h3>
                    <p>Cancelled</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
