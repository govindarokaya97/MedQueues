{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h2> Appointment Dashboard </h2>

    <div class="row">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div clas="card-body">

                    <h3>{{ appointments_today }}</h3>
                    <p> Today's Appointment </p>

                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning ">
                <div clas="card-body">

                    <h3>{{ pending }}</h3>
                    <p> Pending </p>

                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div clas="card-body">

                    <h3>{{ confirmed }}</h3>
                    <p> Confirmed </p>

                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div clas="card-body">

                    <h3>{{ completed }}</h3>
                    <p> Completed </p>

                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
