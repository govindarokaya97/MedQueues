{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h3>Delete Appointment</h3>

    <p>
        Are you sure you want to delete this appointment?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button class="btn btn-danger">
            Delete
        </button>

        <a href="{% url 'appointments_list' %}" class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
