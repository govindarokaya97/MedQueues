{% extends 'base.html' %}
{% block title %}Set Your Password{% endblock %}
{% block content %}
<h2>Set Your Password</h2>
<p class="text-muted">This is your first login — choose a password you'll use going forward.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Set Password</button>
</form>
{% endblock %}
