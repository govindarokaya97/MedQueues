{% extends "base.html" %}

{% block content %}
{% include "includes/back_button.html" %}


<div class="container mt-4">
    <h2>Add Doctor</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <h4>Account Information</h4>
        {{ user_form.as_p }}

        <h4>Doctor Information</h4>
        {{ doctor_form.as_p }}

        <button type="submit" class="btn btn-primary">
            Save Doctor
        </button>
    </form>
    {% endblock %}
