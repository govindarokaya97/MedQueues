{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>

        Patient Report

    </h2>

    <form method="GET">

        <div class="row">

            <div class="col-md-4">

                <input type="text" name="search" class="form-control" placeholder="Search patient..."
                    value="{{ request.GET.search }}">

            </div>

            <div class="col-md-3">

                <select name="gender" class="form-control">

                    <option value="">All Gender</option>

                    <option value="Male">Male</option>

                    <option value="Female">Female</option>

                </select>

            </div>

            <div class="col-md-3">

                <input type="text" name="blood_group" class="form-control" placeholder="Blood Group">

            </div>

            <div class="col-md-2">

                <button class="btn btn-primary w-100">

                    Search

                </button>

            </div>

        </div>

    </form>

    <hr>

    <table class="table table-bordered table-hover">

        <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Gender</th>

                <th>Phone</th>

                <th>Blood Group</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            {% for patient in patients %}

            <tr>

                <td>

                    {{ patient.id }}

                </td>

                <td>

                    {{ patient }}

                </td>

                <td>

                    {{ patient.gender }}

                </td>

                <td>

                    {{ patient.phone }}

                </td>

                <td>

                    {{ patient.blood_group }}

                </td>

                <td>

                    <a href="{% url 'patient_detail' patient.id %}" class="btn btn-info btn-sm">

                        View

                    </a>

                </td>

            </tr>

            {% empty %}

            <tr>

                <td colspan="6">

                    No patient found.

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
